[pytest]
testpaths = testcases
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    -s
    --alluredir=./reports/allure-results
    --clean-alluredir
markers =
    smoke: 冒烟测试用例
    p0: P0级别核心功能测试
    p1: P1级别主要功能测试
    p2: P2级别次要功能测试
    p3: P3级别优化建议测试
    login: 登录模块测试
    student: 学员管理模块测试
    schedule: 排课管理模块测试
    attendance: 考勤签到模块测试
    finance: 财务管理模块测试
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
